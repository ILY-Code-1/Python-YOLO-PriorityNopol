# dataset.yaml - Konfigurasi dataset YOLOv8
# Format: YOLO Darknet (normalized coordinates)
#
# Struktur folder yang diharapkan:
#   dataset/
#   ├── images/
#   │   ├── train/    ← gambar training (.jpg/.png)
#   │   └── val/      ← gambar validasi (.jpg/.png)
#   ├── labels/
#   │   ├── train/    ← label YOLO (.txt, satu file per gambar)
#   │   └── val/
#   └── dataset.yaml

# Path root dataset (relatif terhadap lokasi script training dijalankan)
path: dataset

# Sub-path relatif terhadap 'path'
train: images/train
val: images/val

# Jumlah kelas
nc: 4

# Nama kelas (indeks = class_id dalam file label)
names:
  0: ambulance
  1: police
  2: fire_truck
  3: license_plate
